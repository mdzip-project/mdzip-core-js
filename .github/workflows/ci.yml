name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.x'
          cache: npm

      - name: Install
        run: npm ci

      - name: Test Coverage
        run: npm run test:coverage --if-present

      - name: Test
        run: npm test
